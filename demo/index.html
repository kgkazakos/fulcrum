<!DOCTYPE html>
<html lang="en">
  <head>

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #6366f1; cursor: pointer; border: none; }
